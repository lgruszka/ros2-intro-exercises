# explore.yaml — PEŁNY config Nav2 + explore_lite dla TRYBU 3 (eksploracja) na REALNYM ROSbocie XL.
#
# Wariant REAL (odpowiednik m8_gazebo/config/explore.yaml — ten pod symulację). Port zwalidowanego
# na żywo configu z tutoriala 10 Husariona (tutorial_pkg, gałąź ros2), dostosowany do ROS 2 Jazzy
# (Gdynia 2026-06). RÓŻNICA REAL vs SIM: collision_monitor WŁĄCZONY (bezpieczeństwo), źródło 'scan'
# → /scan_filtered (costmapy i tak czytają /scan_filtered, więc cały stack spójny).
#
# RÓŻNICA WZGLĘDEM nav2_rosbot.yaml (tryb 2): tu controllerem jest RegulatedPurePursuit (lekki,
# jak w tutorialu Husariona), a w nawigacji po zapisanej mapie używamy MPPI (nasz strojony config).
# explore.launch.py podaje TEN plik do navigation_launch.py ORAZ do węzła explore_lite.
#
# Migracja Humble→Jazzy zaszyta tutaj (inaczej bringup pada — patrz M8 „Migracja Humble→Jazzy"):
#   • pluginy pkg::Class (nie pkg/Class)
#   • plugin_lib_names wbudowanych węzłów BT ZAKOMENTOWANE (Jazzy rejestruje je auto)
#   • sekcje collision_monitor + docking_server (stockowy navigation_launch.py w Jazzy je odpala)
#   • costmapy czytają /scan_filtered (slam.launch.py odpala box-filter; bez tego self-hity lidaru)

behavior_server:
  ros__parameters:
    enable_stamped_cmd_vel: true   # ROSbot bierze TwistStamped na /cmd_vel
    local_costmap_topic: local_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_costmap_topic: global_costmap/costmap_raw
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins:
      ["spin", "backup", "drive_on_heading", "wait", "assisted_teleop"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_timeout: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/filtered    # ROSbot publikuje EKF, nie /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    # Jazzy: NIE wymieniaj wbudowanych węzłów BT — rejestrowane automatycznie.
    # Jawna lista (styl Humble) → "ID [ComputePathToPose] already registered" + segfault.
    # Dodawaj tu TYLKO własne, niestandardowe pluginy BT.
    # plugin_lib_names: []

controller_server:
  ros__parameters:
    enable_stamped_cmd_vel: true
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.03
    min_y_velocity_threshold: 0.03
    min_theta_velocity_threshold: 0.3
    failure_tolerance: 2.0

    progress_checker_plugin: "progress_checker"
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    goal_checker_plugin: "goal_checker"
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.1
      yaw_goal_tolerance: 0.2
      stateful: True

    controller_plugins: ["FollowPath"]
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.4
      lookahead_dist: 0.6
      min_lookahead_dist: 0.4
      max_lookahead_dist: 0.9
      lookahead_time: 2.0
      transform_tolerance: 0.1
      use_velocity_scaled_lookahead_dist: true
      min_approach_linear_velocity: 0.1
      approach_velocity_scaling_dist: 0.5
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.1
      allow_reversing: false
      use_rotate_to_heading: true
      rotate_to_heading_min_angle: 0.785
      max_angular_accel: 5.0
      rotate_to_heading_angular_vel: 1.8
      max_robot_pose_search_dist: 10.0
      use_interpolation: true

# explore_lite (frontier-based). Wartości zweryfikowane na ROSbocie XL (Gdynia).
explore_node:
  ros__parameters:
    robot_base_frame: base_link
    costmap_topic: /global_costmap/costmap
    costmap_updates_topic: /global_costmap/costmap_updates
    visualize: true
    planner_frequency: 0.2        # Hz — jak często liczyć frontiery
    progress_timeout: 15.0        # s — porzuć cel nieosiągalny i wybierz inny
    potential_scale: 5.0          # waga: bliżej = lepiej (większa = mniej skoków)
    orientation_scale: 0.5        # preferuj frontiery "na wprost" (mniej obrotów)
    gain_scale: 1.0               # waga: większy nieznany obszar = lepiej
    transform_tolerance: 0.1
    min_frontier_size: 0.6        # m — ignoruj drobne frontiery (szum)

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      width: 3
      height: 3
      resolution: 0.03
      rolling_window: True
      always_send_full_costmap: True
      footprint: "[[0.17, 0.17], [0.17, -0.17], [-0.17, -0.17], [-0.17, 0.17]]"
      footprint_padding: 0.03
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: True
        inflation_radius: 0.75
        cost_scaling_factor: 3.0
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan_filtered      # wyjście box-filtra (slam.launch.py); bez self-hitów
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.2
          obstacle_max_range: 2.5
          obstacle_min_range: 0.2    # ignoruj odczyty < 0.2 m (lidar widzi własną konstrukcję)
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: True
        map_subscribe_transient_local: True

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      resolution: 0.05
      always_send_full_costmap: True
      track_unknown_space: True
      footprint: "[[0.17, 0.17], [0.17, -0.17], [-0.17, -0.17], [-0.17, 0.17]]"
      footprint_padding: 0.03
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: True
        inflation_radius: 0.75
        cost_scaling_factor: 3.0
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan_filtered
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.2
          obstacle_max_range: 2.5
          obstacle_min_range: 0.2
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: True
        map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 1.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"   # Jazzy: :: nie /
      tolerance: 0.2
      use_astar: false
      allow_unknown: true

smoother_server:
  ros__parameters: {}

waypoint_follower:
  ros__parameters:
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    enable_stamped_cmd_vel: true
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [0.5, 0.0, 1.5]
    min_velocity: [-0.5, 0.0, -1.5]
    max_accel: [1.5, 0.0, 3.0]
    max_decel: [-1.5, 0.0, -3.0]
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

# Jazzy: stockowy navigation_launch.py odpala collision_monitor — bez tej sekcji
# "observation_sources is not initialized".
collision_monitor:
  ros__parameters:
    enable_stamped_cmd_vel: true
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.2
    source_timeout: 1.0
    base_shift_correction: True
    stop_pub_timeout: 2.0
    polygons: ["FootprintApproach"]
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "/local_costmap/published_footprint"
      time_before_collision: 1.2
      simulation_time_step: 0.1
      min_points: 6
      visualize: False
      # REAL: WŁĄCZONY (bezpieczeństwo). Bezpieczny, bo 'scan' → /scan_filtered (box-filter
      # z slam.launch.py wyciął self-hity, więc brak fałszywego hamowania).
      enabled: True
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "scan_filtered"
      min_height: 0.15
      max_height: 2.0
      enabled: True

# Jazzy: stockowy navigation_launch.py odpala docking_server — bez 'dock_plugins'
# "Charging dock plugins not given!". Eksploracja dokowania nie używa, ale węzeł musi się
# skonfigurować. NIE dawać 'docks: []' (rzuca "No parameter value set").
docking_server:
  ros__parameters:
    controller_frequency: 50.0
    dock_plugins: ['simple_charging_dock']
    simple_charging_dock:
      plugin: 'opennav_docking::SimpleChargingDock'
      use_battery_status: false
      use_external_detection_pose: false
      use_stall_detection: false
